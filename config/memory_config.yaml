# ============================================================
# Memory system config -- short-term compression + long-term mem0
#
# Reference: docs/记忆系统设计讨论.md §7, §8.1-§8.7
# ============================================================

# --- Short-term memory: L1 Snip / L3 Collapse / L4 Super-Compact ---
short_term:
  # L1 Snip -- pure-rule cleaning, no LLM call
  snip:
    filler_words: ["嗯", "啊", "呃", "额", "那个", "就是说", "对对对"]
    similarity_threshold: 0.95       # duplicate-removal threshold
    max_single_message_tokens: 800   # hard truncation limit

  # L3 Collapse -- round-driven compression
  collapse:
    trigger_rounds: 26               # every N rounds triggers L3
    compress_rounds: 20              # oldest M rounds get compressed
    keep_recent_rounds: 6            # keep latest K rounds raw

  # L4 Super-Compact -- block-count-driven meta compression
  super_compact:
    trigger_blocks: 4                # every N level-0 blocks triggers L4

  # Compressor role mapping -- references llm_config.yaml#llm_roles.
  # Prompt templates are resolved automatically by prompts/prompt_loader.py
  # (load_compress('l3_collapse') / load_compress('l4_super_compact')).
  compressor:
    l3_role: l3_compress
    l4_role: l4_compact

# --- Long-term memory: mem0 ---
mem0:
  mode: local_deploy                 # "sdk" | "local_deploy"

  # --- Mode A: mem0 SaaS ---
  sdk:
    api_key: ${MEM0_API_KEY}

  # --- Mode B: local / self-hosted ---
  local_deploy:
    vector_store:
      provider: pgvector  # active provider: qdrant | pgvector
      providers:
        qdrant:
          config:
            path: ./data/qdrant        # embedded mode (default)
            # host: localhost          # uncomment for server mode
            # port: 6333
        pgvector:
          config:
            connection_string: ${DB_MEMORY_URL} # Neon/PostgreSQL connection string 

            # PostgreSQL table name used by mem0 for vector memories.
            # Use lowercase snake_case because mem0's pgvector backend does
            collection_name: atri_memories

            # Must match the embedding model output dimension.
            # BAAI/bge-m3 is 1024; text-embedding-3-small is 1536.
            # Changing this after data exists requires rebuilding the table.
            embedding_model_dims: 1024  # BAAI/bge-m3 embedding dimension

            # Create an HNSW vector index for faster approximate nearest-neighbor search.
            # Recommended for common cloud PostgreSQL + pgvector deployments.
            hnsw: true

            # DiskANN requires the vectorscale extension, which is not always
            # available on managed PostgreSQL. Keep false unless your provider supports it.
            diskann: false

            # PostgreSQL connection pool size used by mem0's pgvector backend.
            # minconn keeps this many idle connections open; maxconn caps concurrent
            # database connections. Keep maxconn modest on Neon free/small plans.
            minconn: 1
            maxconn: 5

    embedder:
      backend: api                # "ollama" | "api"
      ollama:
        model: bge-m3
        base_url: http://localhost:11434
      api:
        provider: openai
        model: BAAI/bge-m3
        api_key: ${SILICONFLOW_API_KEY}
        base_url: https://api.siliconflow.cn/v1

    llm:
      reuse_main_llm: false          # use independent fact-extraction LLM
      backend: api                # "ollama" | "api"
      ollama:
        model: qwen2.5:7b
        base_url: http://localhost:11434
        temperature: 0.3             # fact extraction prefers low temperature for stable JSON
      api:
        provider: openai
        model: deepseek-ai/DeepSeek-V4-Flash
        api_key: ${SILICONFLOW_API_KEY}
        base_url: https://api.siliconflow.cn/v1
        temperature: 0.3             # fact extraction prefers low temperature for stable JSON

    # Graph Memory -- MVP disabled, structure reserved
    graph_store:
      enabled: false
      provider: neo4j
      config:
        url: bolt://localhost:7687
        username: neo4j
        password: ${NEO4J_PASSWORD}

  # search() parameters, shared by both modes
  search:
    limit: 5
    threshold: 0.3
    rerank: false

# --- Storage paths ---
storage:
  characters_dir: ./data/characters
